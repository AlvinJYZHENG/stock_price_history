name: Update Stock Prices

# --- 添加开始：授予写入权限 ---
permissions:
  contents: write
# --- 添加结束 ---

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-csv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        id: run_script
        run: |
          python update_stocks.py 2>&1 | tee log.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Show detailed error log
        if: steps.run_script.outputs.exit_code != '0'
        run: |
          echo "### ❌ 脚本运行失败，详细错误日志如下：" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat log.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat log.txt
          exit 1

      - name: Commit and push if changed
        if: steps.run_script.outputs.exit_code == '0'
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          if [ -f stock_price_history.csv ]; then
            echo "发现文件 stock_price_history.csv，准备提交..."
            git add stock_price_history.csv
            
            if git diff --staged --quiet; then
              echo "文件没有变化，跳过提交。"
            else
              git commit -m "Update stock prices: $(date +'%Y-%m-%d')"
              git push
              echo "提交成功！"
            fi
          else
            echo "错误：脚本运行成功但未生成 stock_price_history.csv 文件！"
            exit 1
          fi
