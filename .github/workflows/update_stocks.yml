name: Update Stock Prices

on:
  schedule:
    # 北京时间每天早上 8:00 运行 (UTC 0点)
    - cron: '0 0 * * *'
  
  # 允许手动触发工作流进行测试
  workflow_dispatch:

jobs:
  update-csv:
    runs-on: ubuntu-latest

    steps:
      # 1. 升级了 actions/checkout 到 v5
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          # 必须拉取完整历史，以便脚本正确读取 CSV
          fetch-depth: 0

      # 2. 升级了 actions/setup-python 到 v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # 建议使用较新的 Python 版本

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        run: python update_stocks.py

      - name: Commit and push if changed
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add stock_price_history.csv
          # 只有当文件确实有变化时才提交
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update stock prices: $(date +'%Y-%m-%d')" && git push)
