name: Update Stock Prices

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 0点执行
  workflow_dispatch:     # 允许手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-csv:
    runs-on: ubuntu-latest
    
    # 关键修复1：在JOB层级设置权限
    permissions:
      contents: write  # 必须明确授予写入权限
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # 获取完整历史记录
          token: ${{ secrets.GITHUB_TOKEN }}  # 使用token检出
        
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run script
        id: run_script
        run: |
          python update_stocks.py 2>&1 | tee log.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true
      
      - name: Show error log
        if: steps.run_script.outputs.exit_code != '0'
        run: |
          echo "::error::Script failed! See log below"
          cat log.txt
          exit 1
      
      - name: Commit and push changes
        if: steps.run_script.outputs.exit_code == '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # --- 关键修复：使用通配符一次性添加所有匹配的文件 ---
          # 这样即使文件名有微小变动也能捕获
          git add "stock_price_history*.csv"
          
          # --- 增强检查：确认是否真的抓到了文件 ---
          # 统计添加了多少个文件
          changed_files=$(git diff --cached --name-only | wc -l)
          if [ "$changed_files" -eq 0 ]; then
            echo "No CSV files were detected for commit. This usually means the script failed to generate them silently."
            exit 1
          else
            echo "Detected $changed_files files to commit."
            git diff --cached --name-only # 打印出具体是哪几个文件，方便调试
          fi
          
          git commit -m "Update stock prices: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push origin HEAD:${GITHUB_REF#refs/heads/}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
