name: Update Stock Prices

on:
  schedule:
    # 北京时间每天早上 8:00 运行 (UTC 0点)
    - cron: '0 0 * * *'
  
  # 允许手动触发工作流进行测试
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-csv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        id: run_script
        run: |
          python update_stocks.py 2>&1 | tee log.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Show detailed error log
        if: steps.run_script.outputs.exit_code != '0'
        run: |
          echo "### ❌ 脚本运行失败，详细错误日志如下：" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat log.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat log.txt
          exit 1

      # --- 修改了这部分逻辑 ---
      - name: Commit and push if changed
        if: steps.run_script.outputs.exit_code == '0'
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          # 检查文件是否存在
          if [ -f stock_price_history.csv ]; then
            echo "发现文件 stock_price_history.csv，准备提交..."
            git add stock_price_history.csv
            
            # 检查是否有变化
            if git diff --staged --quiet; then
              echo "文件没有变化，跳过提交。"
            else
              git commit -m "Update stock prices: $(date +'%Y-%m-%d')"
              git push
              echo "提交成功！"
            fi
          else
            echo "错误：脚本运行成功但未生成 stock_price_history.csv 文件！"
            exit 1
          fi
