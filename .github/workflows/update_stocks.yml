name: Update Stock Prices

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 0点执行
  workflow_dispatch:     # 允许手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-csv:
    runs-on: ubuntu-latest
    
    # 关键修复1：在JOB层级设置权限
    permissions:
      contents: write  # 必须明确授予写入权限
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # 获取完整历史记录
          token: ${{ secrets.GITHUB_TOKEN }}  # 使用token检出
        
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run script
        id: run_script
        run: |
          python update_stocks.py 2>&1 | tee log.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true
      
      - name: Show error log
        if: steps.run_script.outputs.exit_code != '0'
        run: |
          echo "::error::Script failed! See log below"
          cat log.txt
          exit 1
      
      - name: Commit and push changes
        if: steps.run_script.outputs.exit_code == '0'
        run: |
          # 配置Git身份
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          #检查所有三个文件是否存在 ---
          files_to_check=(
            "stock_price_history.csv"
            "stock_price_history_hk.csv"
            "stock_price_history_us.csv"
          )

          for file in "${files_to_check[@]}"; do
            if [ ! -f "$file" ]; then
              echo "::error::File not found: $file"
              exit 1
            fi
          done
          # --- 检查结束 ---
                    
          # 添加所有CSV文件（三个文件）
          git add stock_price_history.csv stock_price_history_hk.csv stock_price_history_us.csv
          
          # 检查是否有实际变更
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            # 提交变更
            git commit -m "Update stock prices: $(date -u +'%Y-%m-%d %H:%M UTC')"
            
            # 关键修复2：使用带认证的push
            git push origin HEAD:${GITHUB_REF#refs/heads/}
          fi
        env:
          # 关键修复3：注入认证token
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
